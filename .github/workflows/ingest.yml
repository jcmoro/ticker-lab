name: Daily Ingestion

on:
  schedule:
    # 16:30 UTC Mon-Fri (ECB publishes ~16:00 CET)
    - cron: "30 16 * * 1-5"
    # 08:00 UTC daily (crypto prices update continuously)
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  exchange-rates:
    name: Ingest ECB Exchange Rates
    runs-on: ubuntu-latest
    environment: prod
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRANKFURTER_BASE_URL: https://api.frankfurter.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ingestion
        run: pnpm --filter @ticker-lab/api job:ingest

  crypto:
    name: Ingest Crypto Prices
    runs-on: ubuntu-latest
    environment: prod
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/crypto-go/go.sum

      - name: Run ingestion
        run: cd apps/crypto-go && go run . ingest
