name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Quality Gates
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Render
    needs: ci
    runs-on: ubuntu-latest
    concurrency: deploy
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered. Check https://dashboard.render.com for status."
