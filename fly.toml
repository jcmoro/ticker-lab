app = "tickerlab"
primary_region = "mad"

[build]
  dockerfile = "docker/api/Dockerfile"

[deploy]
  release_command = "node dist/infrastructure/persistence/migrate.js"

[env]
  NODE_ENV = "production"
  API_PORT = "3000"
  API_HOST = "0.0.0.0"
  FRANKFURTER_BASE_URL = "https://api.frankfurter.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/health"

  [checks.ready]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/ready"
