openapi: 3.1.0
info:
  title: Ticker Lab API
  description: |
    Financial data dashboard API. Polyglot architecture experiment with Node.js and Go
    microservices. Ingests ECB exchange rates and crypto prices from public APIs.
    Exchange rates served by Node.js (Fastify), crypto and converter by Go (stdlib).
  version: 0.7.0
  contact:
    name: Ticker Lab
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development (Node.js)
  - url: http://localhost:8080
    description: Local development (Go converter)
  - url: http://localhost:8090
    description: Local development (Go crypto)

tags:
  - name: system
    description: Health and operational endpoints
  - name: exchange-rates
    description: ECB exchange rate data via Frankfurter (Node.js)
  - name: crypto
    description: Crypto prices via CoinGecko (Go)

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service health status. Used by load balancers and monitoring.
      tags:
        - system
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                timestamp: "2026-04-19T12:00:00.000Z"

  /ready:
    get:
      operationId: getReadiness
      summary: Readiness check
      description: Returns service readiness status including database connectivity. Used by orchestrators to determine if the service can accept traffic.
      tags:
        - system
      responses:
        "200":
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: ready
                checks:
                  database: ok
                timestamp: "2026-04-19T12:00:00.000Z"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: not_ready
                checks:
                  database: error
                timestamp: "2026-04-19T12:00:00.000Z"

  /api/v1/exchange-rates/latest:
    get:
      operationId: getLatestExchangeRates
      summary: Get latest exchange rates
      description: Returns the most recent exchange rates for a given base currency from the ECB.
      tags:
        - exchange-rates
      parameters:
        - $ref: "#/components/parameters/BaseCurrency"
      responses:
        "200":
          description: Latest exchange rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRatesResponse"
              example:
                base: EUR
                date: "2026-04-17"
                rates:
                  - currency: USD
                    rate: 1.1358
                  - currency: GBP
                    rate: 0.8561
        "404":
          description: No rates found for the given base currency
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/exchange-rates/{date}:
    get:
      operationId: getExchangeRatesByDate
      summary: Get exchange rates for a specific date
      description: Returns exchange rates for a given base currency on a specific date from the ECB.
      tags:
        - exchange-rates
      parameters:
        - $ref: "#/components/parameters/BaseCurrency"
        - name: date
          in: path
          required: true
          description: Date in ISO 8601 format (YYYY-MM-DD). Must be a business day.
          schema:
            type: string
            format: date
          example: "2026-04-17"
      responses:
        "200":
          description: Exchange rates for the requested date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRatesResponse"
        "404":
          description: No rates found for the given date and base currency
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/convert:
    get:
      operationId: convertCurrency
      summary: Convert between currencies
      description: Converts an amount from one currency to another using the latest ECB rates. Supports cross-rates via EUR (e.g., GBP to JPY).
      tags:
        - exchange-rates
      parameters:
        - name: from
          in: query
          required: true
          description: Source currency (ISO 4217)
          schema:
            type: string
            minLength: 3
            maxLength: 3
          example: EUR
        - name: to
          in: query
          required: true
          description: Target currency (ISO 4217)
          schema:
            type: string
            minLength: 3
            maxLength: 3
          example: USD
        - name: amount
          in: query
          required: false
          description: Amount to convert. Defaults to 1.
          schema:
            type: number
            default: 1
            minimum: 0
          example: 100
      responses:
        "200":
          description: Conversion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionResponse"
              example:
                from: EUR
                to: USD
                amount: 100
                rate: 1.1797
                result: 117.97
                date: "2026-04-17"

  /api/v1/go/convert:
    get:
      operationId: convertCurrencyGo
      summary: Convert between currencies (Go engine)
      description: Same conversion logic as `/api/v1/convert` but served by a standalone Go microservice. Useful for comparing runtimes.
      tags:
        - exchange-rates
      parameters:
        - name: from
          in: query
          required: true
          description: Source currency (ISO 4217)
          schema:
            type: string
          example: EUR
        - name: to
          in: query
          required: true
          description: Target currency (ISO 4217)
          schema:
            type: string
          example: USD
        - name: amount
          in: query
          required: false
          schema:
            type: number
            default: 1
          example: 100
      responses:
        "200":
          description: Conversion result (includes engine field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionResponse"

  /api/v1/crypto/latest:
    get:
      operationId: getCryptoLatest
      summary: Get latest crypto prices
      description: Returns current prices for the top 20 cryptocurrencies in EUR and USD. Served by the Go crypto microservice.
      tags:
        - crypto
      responses:
        "200":
          description: Latest crypto prices sorted by market cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoLatestResponse"
              example:
                date: "2026-04-19"
                count: 20
                prices:
                  - coin_id: bitcoin
                    symbol: BTC
                    name: Bitcoin
                    price_eur: 63587
                    price_usd: 74658
                    market_cap_eur: 1272774376670.26
                    change_24h: -1.0779
                    date: "2026-04-19"

  /api/v1/crypto/{id}/history:
    get:
      operationId: getCryptoHistory
      summary: Get crypto price history
      description: Returns historical prices for a cryptocurrency. Served by the Go crypto microservice.
      tags:
        - crypto
      parameters:
        - name: id
          in: path
          required: true
          description: CoinGecko coin ID (e.g., bitcoin, ethereum, solana)
          schema:
            type: string
          example: bitcoin
        - name: days
          in: query
          required: false
          description: Number of days of history. Defaults to 90.
          schema:
            type: integer
            default: 90
          example: 365
      responses:
        "200":
          description: Crypto price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoHistoryResponse"

  /api/v1/exchange-rates/history:
    get:
      operationId: getExchangeRateHistory
      summary: Get historical exchange rates for a currency pair
      description: Returns a time series of exchange rates for a specific currency pair over a date range. Used for charts and trend analysis.
      tags:
        - exchange-rates
      parameters:
        - $ref: "#/components/parameters/BaseCurrency"
        - name: quote
          in: query
          required: true
          description: ISO 4217 quote currency code
          schema:
            type: string
            minLength: 3
            maxLength: 3
          example: USD
        - name: from
          in: query
          required: false
          description: Start date (YYYY-MM-DD). Defaults to 30 days ago.
          schema:
            type: string
            format: date
          example: "2026-01-01"
        - name: to
          in: query
          required: false
          description: End date (YYYY-MM-DD). Defaults to today.
          schema:
            type: string
            format: date
          example: "2026-04-17"
      responses:
        "200":
          description: Historical exchange rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
              example:
                base: EUR
                quote: USD
                from: "2026-01-01"
                to: "2026-04-17"
                rates:
                  - date: "2026-01-02"
                    rate: 1.0358
                  - date: "2026-01-03"
                    rate: 1.0412

components:
  parameters:
    BaseCurrency:
      name: base
      in: query
      required: false
      description: ISO 4217 base currency code. Defaults to EUR.
      schema:
        type: string
        default: EUR
        minLength: 3
        maxLength: 3
      example: EUR

  schemas:
    HealthResponse:
      title: HealthResponse
      description: Service health status
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          description: Health status indicator
          enum:
            - ok
          example: ok
        timestamp:
          type: string
          format: date-time
          description: Current server time in ISO 8601 format
          example: "2026-04-19T12:00:00.000Z"

    ConversionResponse:
      title: ConversionResponse
      description: Result of a currency conversion
      type: object
      required:
        - from
        - to
        - amount
        - rate
        - result
        - date
      properties:
        from:
          type: string
          description: Source currency code
          example: EUR
        to:
          type: string
          description: Target currency code
          example: USD
        amount:
          type: number
          description: Original amount
          example: 100
        rate:
          type: number
          description: Exchange rate applied (from → to)
          example: 1.1797
        result:
          type: number
          description: Converted amount
          example: 117.97
        date:
          type: string
          format: date
          description: Date of the rates used
          example: "2026-04-17"

    HistoryResponse:
      title: HistoryResponse
      description: Time series of exchange rates for a currency pair
      type: object
      required:
        - base
        - quote
        - from
        - to
        - rates
      properties:
        base:
          type: string
          description: ISO 4217 base currency code
          example: EUR
        quote:
          type: string
          description: ISO 4217 quote currency code
          example: USD
        from:
          type: string
          format: date
          description: Start date of the range
          example: "2026-01-01"
        to:
          type: string
          format: date
          description: End date of the range
          example: "2026-04-17"
        rates:
          type: array
          description: Time series of rates ordered by date ascending
          items:
            $ref: "#/components/schemas/HistoryPoint"

    HistoryPoint:
      title: HistoryPoint
      description: A single data point in a rate time series
      type: object
      required:
        - date
        - rate
      properties:
        date:
          type: string
          format: date
          description: Date of the rate
          example: "2026-01-02"
        rate:
          type: number
          description: Exchange rate on this date
          example: 1.0358

    ReadinessResponse:
      title: ReadinessResponse
      description: Service readiness status with dependency checks
      type: object
      required:
        - status
        - checks
        - timestamp
      properties:
        status:
          type: string
          description: Overall readiness status
          enum:
            - ready
            - not_ready
          example: ready
        checks:
          type: object
          description: Individual dependency check results
          required:
            - database
          properties:
            database:
              type: string
              description: Database connectivity status
              enum:
                - ok
                - error
              example: ok
        timestamp:
          type: string
          format: date-time
          description: Current server time in ISO 8601 format
          example: "2026-04-19T12:00:00.000Z"

    ExchangeRatesResponse:
      title: ExchangeRatesResponse
      description: A set of exchange rates for a base currency on a given date
      type: object
      required:
        - base
        - date
        - rates
      properties:
        base:
          type: string
          description: ISO 4217 base currency code
          example: EUR
        date:
          type: string
          format: date
          description: Date of the exchange rates (YYYY-MM-DD)
          example: "2026-04-17"
        rates:
          type: array
          description: List of exchange rates relative to the base currency
          items:
            $ref: "#/components/schemas/Rate"

    Rate:
      title: Rate
      description: A single exchange rate for a currency pair
      type: object
      required:
        - currency
        - rate
      properties:
        currency:
          type: string
          description: ISO 4217 quote currency code
          example: USD
        rate:
          type: number
          description: Exchange rate relative to the base currency
          example: 1.1358

    CryptoLatestResponse:
      title: CryptoLatestResponse
      description: Latest prices for top cryptocurrencies
      type: object
      required:
        - date
        - count
        - prices
      properties:
        date:
          type: string
          format: date
          description: Date of the prices
          example: "2026-04-19"
        count:
          type: integer
          description: Number of coins returned
          example: 20
        prices:
          type: array
          items:
            $ref: "#/components/schemas/CryptoPrice"

    CryptoPrice:
      title: CryptoPrice
      description: Price data for a cryptocurrency
      type: object
      required:
        - coin_id
        - symbol
        - name
        - price_eur
        - price_usd
        - date
      properties:
        coin_id:
          type: string
          description: CoinGecko coin identifier
          example: bitcoin
        symbol:
          type: string
          description: Ticker symbol
          example: BTC
        name:
          type: string
          description: Full coin name
          example: Bitcoin
        price_eur:
          type: number
          description: Price in EUR
          example: 63587
        price_usd:
          type: number
          description: Price in USD
          example: 74658
        market_cap_eur:
          type: number
          description: Market capitalization in EUR
          example: 1272774376670.26
        change_24h:
          type: number
          description: 24h price change percentage
          example: -1.0779
        date:
          type: string
          format: date
          description: Date of the price
          example: "2026-04-19"

    CryptoHistoryResponse:
      title: CryptoHistoryResponse
      description: Historical prices for a cryptocurrency
      type: object
      required:
        - coin_id
        - days
        - count
        - prices
      properties:
        coin_id:
          type: string
          description: CoinGecko coin identifier
          example: bitcoin
        days:
          type: integer
          description: Number of days requested
          example: 90
        count:
          type: integer
          description: Number of data points returned
          example: 90
        prices:
          type: array
          items:
            $ref: "#/components/schemas/CryptoHistoryPoint"

    CryptoHistoryPoint:
      title: CryptoHistoryPoint
      description: A single data point in a crypto price time series
      type: object
      required:
        - date
        - price
      properties:
        date:
          type: string
          format: date
          description: Date of the price
          example: "2026-01-02"
        price:
          type: number
          description: Price in EUR
          example: 58234.12

    ProblemDetails:
      title: ProblemDetails
      description: Error response following RFC 9457
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type
          example: "https://tickerlab.dev/problems/not-found"
        title:
          type: string
          description: Short human-readable summary of the problem
          example: Not Found
        status:
          type: integer
          description: HTTP status code
          example: 404
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
          example: No exchange rates found for EUR on 2026-04-20
        code:
          type: string
          description: Machine-readable error code in SCREAMING_SNAKE_CASE
          example: RATES_NOT_FOUND
